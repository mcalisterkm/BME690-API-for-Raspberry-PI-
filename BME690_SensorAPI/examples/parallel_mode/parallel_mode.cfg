# BME690 Parallel Mode Configuration File
# Default settings for parallel mode operation

# I2C Configuration
bus = 1
port = 0x76

# Sensor Oversampling (0, 1, 2, 4, 8, 16)
osh = 16
ost = 16
osp = 16

# IIR Filter (0, 2, 4, 8, 16, 32, 64, 128)
lpf = 0

# Output Data Rate (0-8)
slp = 8

# Heater Temperature Profile (comma-separated, 10 values, no spaces)
temp_prof = 320,100,100,100,200,200,200,320,320,320

# Heater Duration Multipliers (comma-separated, 10 values, no spaces)
# Multiplied by 140ms to get actual duration per profile stage
mul_prof = 5,2,10,30,5,5,5,5,5,5

# Sampling
samples = 50
sleep_sec = 0
