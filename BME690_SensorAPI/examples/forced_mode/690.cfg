# Forced mode configuration for BME690
# Keep spaces around '=' for parser.h format

# Sensor bus/address keys are applied in forced_mode via rpi-common
port = 0x76
bus = 1

# Oversampling values: 0, 1, 2, 4, 8, 16
osh = 16
ost = 16
osp = 16

# IIR filter coefficient: 0, 2, 4, 8, 16, 32, 64, 128
lpf = 0

# ODR enum value: 0..8 (8 means none)
slp = 8

# Forced mode uses scalar heater settings
heatr_temp = 300
heatr_dur = 100

# Output loop controls
samples = 3000
sleep_sec = 3
